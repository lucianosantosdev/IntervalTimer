name: Reusable build variant release workflow

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string

jobs:
  deploy:
    name: 'Release for ${{ inputs.target }}'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true

      - uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.target }}
          path: 'artifacts'

      - name: Replace stale screenshots with freshly generated ones
        run: |
          if [ "${{ inputs.target }}" = "mobile" ]; then
            rm -rf fastlane/metadata/android/en-US/images/phoneScreenshots
          else
            rm -rf fastlane/metadata/android/en-US/images/wearScreenshots
          fi

      - uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.target }}-screenshots
          path: fastlane/metadata/android/en-US/images/

      - name: Materialize release notes for this versionCode
        run: |
          set -euo pipefail
          NEXT="fastlane/metadata/android/en-US/changelogs/next.txt"
          if [ ! -f "$NEXT" ]; then
            echo "No next.txt release notes found; skipping changelog file."
            exit 0
          fi
          TAG=$(git describe --tags --abbrev=0)
          RUN=$(printf "%04d" "$GITHUB_RUN_NUMBER")
          if [ "${{ inputs.target }}" = "mobile" ]; then
            SUFFIX=10
          else
            SUFFIX=30
          fi
          VERSION_CODE="${TAG}${RUN}${SUFFIX}"
          DEST="fastlane/metadata/android/en-US/changelogs/${VERSION_CODE}.txt"
          cp "$NEXT" "$DEST"
          echo "Wrote changelog to $DEST:"
          cat "$DEST"

      - name: Create Google Play Config file
        env:
          PLAY_CONFIG_JSON: ${{ secrets.PLAY_CONFIG_JSON }}
        run : |
          echo "$PLAY_CONFIG_JSON" > play_config.json.b64
          base64 -d -i play_config.json.b64 > play_config.json
      
      - name: Distribute app to Internal Testing track 🚀
        run: |
          SUPPLY_UPLOAD_MAX_RETRIES=10 bundle exec fastlane internal_${{inputs.target}} \
            artifact:$(find . -iname "*.aab") \
            packageName:dev.lucianosantos.intervaltimer